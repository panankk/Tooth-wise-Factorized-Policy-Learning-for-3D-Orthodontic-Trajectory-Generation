DATA:
  PROCESSED_ROOT: "/home/pa/version4/data/Teeth_simulation_10K_processed_new_v11"

MODEL:
  BACKBONE:
    NAME: "MiniPointNet"
  STRATEGY:
    NAME: "IdentityGate"         # 👈 消融：门控全开，所有牙齿强制允许移动
  HEAD:
    POS:
      NAME: "DeterministicHead"  # 👈 消融：退化为纯 MSE，无方差
    ROT:
      NAME: "DeterministicHead"
  
  USE_SPATIAL_ATTN: False        # 👈 消融：关闭空间 Transformer
  USE_TEMPORAL_ATTN: False       # 👈 消融：关闭时间位置编码
  
  D_MODEL: 512
  NHEAD: 8
  NUM_LAYERS: 6
  DROPOUT: 0.1
  NUM_TEETH: 32

TRAIN:
  SAVE_DIR: "/home/pa/version-final/checkpoints_ab01_baseline_new-2"
  BATCH_SIZE: 32
  NUM_EPOCHS: 300
  STAGE1_EPOCHS: 300             # 只有 MSE，不需要多阶段热启动
  STAGE2_EPOCHS: 0
  STAGE3_FREEZE_EPOCHS: 0
  LEARNING_RATE: 0.001
  WARMUP_EPOCHS: 15

INFER:
  UNCERTAINTY_SCALE_FACTOR: 0.0  # 确定性模型，无不确定性缩放
  STOP_THRES_POS: 0.2
  STOP_THRES_DEG: 3.0
  MASK_THRESHOLD: 0.5